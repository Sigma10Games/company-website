<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary Meta Tags -->
    <title>Lucky Arcade - Sigma10 Games</title>
    <meta name="title" content="Lucky Arcade">
    <meta name="description" content="Play, Win, and Get Lucky! Download now for free.">

    <!-- Open Graph (카카오톡, Facebook 등 미리보기) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sigma10games.com/games/lucky-arcade/">
    <meta property="og:title" content="Lucky Arcade">
    <meta property="og:description" content="Play, Win, and Get Lucky! Download now for free.">
    <meta property="og:image" content="https://sigma10games.com/assets/img/og/lucky_arcade.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="Sigma10 Games">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Lucky Arcade">
    <meta name="twitter:description" content="Play, Win, and Get Lucky! Download now for free.">
    <meta name="twitter:image" content="https://sigma10games.com/assets/img/og/lucky_arcade.png">

    <link rel="icon" type="image/x-icon" href="../../assets/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8e53 50%, #ff6b9d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-shapes {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: float 6s ease-in-out infinite;
        }

        .shape:nth-child(1) { width: 300px; height: 300px; background: #fff; top: -80px; left: -80px; animation-delay: 0s; }
        .shape:nth-child(2) { width: 200px; height: 200px; background: #ffe0f0; bottom: -50px; right: -50px; animation-delay: 2s; }
        .shape:nth-child(3) { width: 150px; height: 150px; background: #fff; top: 50%; right: 10%; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 32px;
            padding: 48px 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .game-icon {
            width: 120px;
            height: 120px;
            border-radius: 24px;
            margin: 0 auto 24px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(255, 107, 157, 0.4);
        }

        .game-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-title {
            font-size: 28px;
            font-weight: 800;
            color: #2d2d2d;
            margin-bottom: 8px;
        }

        .game-desc {
            font-size: 15px;
            color: #666;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .redirect-msg {
            font-size: 14px;
            color: #999;
            margin-bottom: 24px;
        }

        .redirect-msg span {
            font-weight: 700;
            color: #ff6b9d;
        }

        .store-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .store-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            border-radius: 16px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 700;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .store-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .store-btn:active {
            transform: translateY(0);
        }

        .google-play {
            background: #2d2d2d;
            color: #fff;
        }

        .app-store {
            background: #007aff;
            color: #fff;
        }

        .store-btn svg {
            flex-shrink: 0;
        }

        .btn-text { text-align: left; }
        .btn-sub { font-size: 11px; font-weight: 400; opacity: 0.8; display: block; }
        .btn-main { font-size: 15px; font-weight: 700; }

        .back-link {
            display: inline-block;
            margin-top: 24px;
            font-size: 13px;
            color: #aaa;
            text-decoration: none;
        }

        .back-link:hover { color: #ff6b9d; }

        .store-btn.highlighted {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 4px 16px rgba(255, 107, 157, 0.4); }
            50% { box-shadow: 0 8px 32px rgba(255, 107, 157, 0.7); }
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="card">
        <div class="game-icon">
            <img src="../../assets/img/portfolio/lucky_arcade.png" alt="Lucky Arcade">
        </div>
        <h1 class="game-title">Lucky Arcade</h1>
        <p class="game-desc">Play, Win, and Get Lucky!</p>

        <p class="redirect-msg" id="redirect-msg"></p>

        <div class="store-buttons" id="store-buttons">
            <a href="https://play.google.com/store/apps/details?id=com.sigma10games.sevenstrawberries"
               id="btn-android"
               class="store-btn google-play"
               target="_blank">
                <svg viewBox="0 0 24 24" width="28" height="28">
                    <path fill="currentColor" d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.5,12.92 20.16,13.19L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z"/>
                </svg>
                <div class="btn-text">
                    <span class="btn-sub">GET IT ON</span>
                    <span class="btn-main">Google Play</span>
                </div>
            </a>
        </div>

    </div>

    <script>
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
        const isAndroid = /android/i.test(ua);

        const msgEl = document.getElementById('redirect-msg');
        const btnAndroid = document.getElementById('btn-android');

        if (isAndroid) {
            msgEl.innerHTML = 'Redirecting to <span>Google Play</span>...';
            btnAndroid.classList.add('highlighted');
            setTimeout(() => { window.location.href = btnAndroid.href; }, 1500);
        } else {
            msgEl.textContent = 'Available on Google Play.';
        }
    </script>
</body>
</html>
